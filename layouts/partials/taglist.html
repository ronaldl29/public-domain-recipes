<div style="clear:both" class=taglist>
Related
<br />
{{ range sort (.GetTerms "tags") "LinkTitle" -}}
  <span><a id="tag_{{ .Page.Title | anchorize }}" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></span>
{{- end }}
</div>
