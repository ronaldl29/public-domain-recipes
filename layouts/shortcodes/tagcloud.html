<ul id="tagcloud">
{{- range .Site.Taxonomies.tags }}
  <li><a id="tag_{{ .Page.Title | anchorize }}" href="{{ .Page.RelPermalink }}">{{ .Page.Title }}</a></li>
{{- end }}
</ul>
